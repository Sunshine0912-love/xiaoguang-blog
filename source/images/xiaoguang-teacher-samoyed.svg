<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="xgt-title xgt-desc">
  <title id="xgt-title">小光老师 — 萨摩耶抱胡萝卜</title>
  <desc id="xgt-desc">Cute Samoyed puppy holding a giant carrot — mascot for AI teacher Xiaoguang</desc>

  <defs>
    <radialGradient id="xgt-bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fdfaf6"/>
      <stop offset="100%" stop-color="#ede4d8"/>
    </radialGradient>
    <radialGradient id="xgt-cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffc5d0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffc5d0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="xgt-carrot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb15f"/>
      <stop offset="50%" stop-color="#ff8f32"/>
      <stop offset="100%" stop-color="#ef7421"/>
    </linearGradient>
    <linearGradient id="xgt-collar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67d7d2"/>
      <stop offset="100%" stop-color="#7eaefe"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#xgt-bg)" stroke="#e8ddd0" stroke-width="1.5"/>

  <!-- ears -->
  <path d="M38 55c-8-22 2-26 14-8 3 4 2 12-2 18Z" fill="#fcfcfc" stroke="#e8ddd0" stroke-width="1"/>
  <path d="M162 55c8-22-2-26-14-8-3 4-2 12 2 18Z" fill="#fcfcfc" stroke="#e8ddd0" stroke-width="1"/>
  <path d="M40 50c-4-8-4-12 2-8 2 2 5 6 5 10Z" fill="#ffdce5" opacity="0.6"/>
  <path d="M160 50c4-8 4-12-2-8-2 2-5 6-5 10Z" fill="#ffdce5" opacity="0.6"/>

  <!-- fluffy cheeks -->
  <circle cx="48" cy="82" r="26" fill="#ffffff" opacity="0.85"/>
  <circle cx="152" cy="82" r="26" fill="#ffffff" opacity="0.85"/>

  <!-- main face -->
  <ellipse cx="100" cy="80" rx="52" ry="44" fill="#ffffff" stroke="#e8ddd0" stroke-width="0.8"/>

  <!-- eyes -->
  <circle cx="75" cy="72" r="13" fill="none" stroke="#4a5568" stroke-width="2.2"/>
  <circle cx="125" cy="72" r="13" fill="none" stroke="#4a5568" stroke-width="2.2"/>
  <circle cx="75" cy="72" r="7.5" fill="#1a202c"/>
  <circle cx="125" cy="72" r="7.5" fill="#1a202c"/>
  <circle cx="72" cy="69" r="3" fill="#ffffff"/>
  <circle cx="122" cy="69" r="3" fill="#ffffff"/>
  <circle cx="77.5" cy="75" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="127.5" cy="75" r="1.5" fill="#ffffff" opacity="0.4"/>

  <!-- eyebrows (happy) -->
  <path d="M62 60c5-3 11-3 16 0" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M122 60c5-3 11-3 16 0" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- nose -->
  <ellipse cx="100" cy="86" rx="8" ry="5.5" fill="#2d3748"/>
  <ellipse cx="98" cy="84" rx="2.8" ry="1.8" fill="#718096"/>

  <!-- mouth -->
  <path d="M90 94c5 3.5 15 3.5 20 0" fill="none" stroke="#2d3748" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>

  <!-- blush -->
  <ellipse cx="55" cy="88" rx="10" ry="6" fill="url(#xgt-cheek)"/>
  <ellipse cx="145" cy="88" rx="10" ry="6" fill="url(#xgt-cheek)"/>

  <!-- giant carrot (across face) -->
  <path d="M15 108c22-6 64-12 95-10 2 0 4 2 4 4s-2 4-4 4c-27-2-62 5-80 10-3 0-5-2-5-5s-1-8-1-8" fill="none" stroke="#54a844" stroke-width="3" stroke-linecap="round"/>
  <rect x="18" y="100" rx="8" ry="8" width="150" height="24" fill="url(#xgt-carrot)" stroke="#e17325" stroke-width="1"/>
  <line x1="40" y1="100" x2="40" y2="124" stroke="#c95e1b" stroke-width="0.8" opacity="0.4"/>
  <line x1="65" y1="100" x2="65" y2="124" stroke="#c95e1b" stroke-width="0.8" opacity="0.4"/>
  <line x1="90" y1="100" x2="90" y2="124" stroke="#c95e1b" stroke-width="0.8" opacity="0.4"/>
  <line x1="115" y1="100" x2="115" y2="124" stroke="#c95e1b" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="100" x2="140" y2="124" stroke="#c95e1b" stroke-width="0.8" opacity="0.4"/>

  <!-- collar -->
  <path d="M65 125c15 12 55 12 70 0l3 12c-18 10-58 10-76 0Z" fill="url(#xgt-collar)" opacity="0.9"/>
  <circle cx="100" cy="130" r="6" fill="#ffd757" stroke="#f6a629" stroke-width="1"/>
  <path d="M95 126c0-2 2-4 5-4s5 2 5 4" fill="none" stroke="#f6a629" stroke-width="1.2" stroke-linecap="round"/>

  <!-- hearts -->
  <text x="30" y="55" font-size="14" opacity="0.7">💕</text>
  <text x="160" y="52" font-size="12" opacity="0.6">💕</text>
  <text x="20" y="160" font-size="10" opacity="0.5">✨</text>
  <text x="170" y="165" font-size="11" opacity="0.5">✨</text>
  <text x="100" y="38" font-size="10" opacity="0.4">✨</text>
</svg>
